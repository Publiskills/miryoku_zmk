name: 'My New Wireless Corne'
on: [push, workflow_dispatch]
jobs:
  build:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["eyelash_nano"]'
      shield: '["eyelash_corne_left nice_oled", "eyelash_corne_right nice_oled", "settings_reset"]'
      clipboard: '["win"]'
      modules: '["publiskills/zmk-corne-oled/main publiskills/zmk-nice-oled/main"]'
      nav: '["invertedt"]'
      alphas: '["qwerty"]'
      kconfig: '["CONFIG_BT_CTLR_TX_PWR_PLUS_8=y\nCONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1\nCONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7\nCONFIG_ZMK_MOUSE=y\nCONFIG_ZMK_KEYBOARD_NAME=\\\"FabW Corne V4\\\""]'  
      branches: '["zmkfirmware/zmk/v0.3-branch"]'
