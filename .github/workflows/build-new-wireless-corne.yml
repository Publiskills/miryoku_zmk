name: 'My New Wireless Corne'
on: push
jobs:
  build:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["eyelash_nano"]'
      shield: '["eyelash_corne_left nice_oled", "eyelash_corne_right nice_oled"]'
      modules: '["Publiskills/zmk-corne-oled/main mctechnology17/zmk-nice-oled/main"]'
      nav: '["invertedt"]'
      alphas: '["qwerty"]'
      kconfig: '["CONFIG_ZMK_KEYBOARD_NAME=\\\"FabW Corne V2\\\""]'  
      branches: '["zmkfirmware/zmk/v0.3-branch"]'
