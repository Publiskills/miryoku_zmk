name: 'My New Wireless Corne'
on: push
jobs:
  build:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["eyelash_corne_left", "eyelash_corne_right"]'
      shield: '["nice_view"]'
      modules: '["Publiskills/zmk-new_corne/main"]'
      nav: '["invertedt"]'
      alphas: '["qwerty"]'
      branches: '["zmkfirmware/zmk/v0.3-branch"]'
