name: 'My New Wireless Corne'
on: push
jobs:
  build:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["nice_nano@2.0.0//zmk"]'
      shield: '["eyelash_corne_left","eyelash_corne_right"]'
      clipboard: '["win"]'
      nav: '["invertedt"]'
      alphas: '["qwerty"]'
      kconfig: '["CONFIG_BT_CTLR_TX_PWR_PLUS_8=y\nCONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1\nCONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7\nCONFIG_ZMK_MOUSE=y\nCONFIG_ZMK_KEYBOARD_NAME=\\\"FabW Corne V2\\\""]'
      modules: 'https://github.com/a741725193/zmk-new_corne'
      branches: '["zmkfirmware/zmk/main"]'
